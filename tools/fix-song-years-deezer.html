<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corregir años · HitYear</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../data/themes.js"></script>
</head>
<body class="bg-[#080812] text-white min-h-screen font-sans">
<div class="max-w-6xl mx-auto p-5">
  <a href="index.html" class="text-purple-300 text-sm">← Tools</a>

  <h1 class="text-4xl font-black mt-4">🛠️ Corregir años desde Deezer</h1>
  <p class="text-gray-400 mt-2">Consulta la API pública de Deezer y genera datasets corregidos descargables.</p>

  <div class="mt-6 flex flex-wrap gap-3 items-center">
    <select id="theme" class="bg-white/10 border border-white/10 rounded-xl px-4 py-3"></select>
    <button id="run" class="px-5 py-3 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 font-bold">Buscar cambios</button>
  </div>

  <div id="summary" class="mt-6"></div>
  <div id="changes" class="mt-6 space-y-3"></div>
</div>

<script>
const CURRENT_YEAR = new Date().getFullYear();

const select = document.getElementById('theme');
HIT_THE_YEAR_THEMES.forEach(theme => {
  const option = document.createElement('option');
  option.value = theme.id;
  option.textContent = theme.label;
  select.appendChild(option);
});

async function loadTheme(theme) {
  await import(`../data/${theme.id}.js`);
  return window[theme.variable];
}

async function fetchTrack(id) {
  const response = await fetch(`https://api.deezer.com/track/${id}`);
  const data = await response.json();
  return data;
}

function download(filename, content) {
  const blob = new Blob([content], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

async function run() {
  const changesEl = document.getElementById('changes');
  const summaryEl = document.getElementById('summary');

  changesEl.innerHTML = '';
  summaryEl.innerHTML = '<p class="text-gray-400">Consultando Deezer...</p>';

  const theme = HIT_THE_YEAR_THEMES.find(t => t.id === select.value);
  const songs = structuredClone(await loadTheme(theme));

  let changes = 0;

  for (const song of songs) {
    if (!song.deezerId) continue;

    try {
      const track = await fetchTrack(song.deezerId);
      const releaseDate = track.release_date || track?.album?.release_date;
      if (!releaseDate) continue;

      const year = Number(String(releaseDate).slice(0,4));
      if (!Number.isInteger(year) || year < 1900 || year > CURRENT_YEAR) continue;

      if (Number(song.year) !== year) {
        changes++;

        changesEl.innerHTML += `
          <div class="rounded-2xl border border-yellow-500/20 bg-yellow-500/10 p-4">
            <div class="font-bold">${song.title}</div>
            <div class="text-sm text-gray-300">${song.artist}</div>
            <div class="mt-2 text-sm">
              <span class="text-red-300">${song.year}</span>
              <span class="mx-2">→</span>
              <span class="text-green-300">${year}</span>
            </div>
          </div>`;

        song.year = year;
      }

      await new Promise(r => setTimeout(r, 120));
    } catch (err) {
      console.error(err);
    }
  }

  summaryEl.innerHTML = `
    <div class="rounded-2xl border border-white/10 bg-white/5 p-5 flex items-center justify-between gap-3">
      <div>
        <div class="text-3xl font-black">${changes}</div>
        <div class="text-gray-400 text-sm">cambios detectados</div>
      </div>
      <button id="download" class="px-4 py-3 rounded-xl bg-green-500 text-black font-bold">Descargar JS actualizado</button>
    </div>`;

  document.getElementById('download').onclick = () => {
    const variableName = theme.variable;
    const content = `var ${variableName} = ${JSON.stringify(songs, null, 4)};\n`;
    download(`${theme.id}.js`, content);
  };
}

document.getElementById('run').addEventListener('click', run);
</script>
</body>
</html>
